<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Science Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header header-blue">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Hub</a>
            <h1>Science Vault</h1>
        </header>
        <main class="main-content">
            <div class="book-item">
                <h4><i class="fas fa-atom"></i> Senior Secondary Physics</h4>
                <p>Mechanics, waves, and electricity breakdown.</p>
                <button class="download-button" onclick="alert('Downloading Physics PDF...')">Download</button>
            </div>
            <div class="book-item">
                <h4><i class="fas fa-flask"></i> Modern Chemistry Vol 1</h4>
                <p>Organic chains, equations, and lab practical tools.</p>
                <button class="download-button" onclick="alert('Downloading Chemistry PDF...')">Download</button>
            </div>
            <div class="book-item">
                <h4><i class="fas fa-dna"></i> Essential Biology</h4>
                <p>Genetics, human anatomy systems, and plant tissues.</p>
                <button class="download-button" onclick="alert('Downloading Biology PDF...')">Download</button>
            </div>
        </main>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ level }} Community Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-box { background: #121214; border-radius: 12px; height: 350px; overflow-y: auto; padding: 12px; border: 1px solid #5B21B6; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #27272A; padding: 10px; border-radius: 12px; border-left: 3px solid #5B21B6; max-width: 85%; align-self: flex-start; }
        .msg-meta { font-size: 10px; color: #FACC15; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; gap: 15px; }
        .msg-text { color: #FFFFFF; font-size: 13px; word-break: break-word; }
        .chat-form { display: flex; gap: 8px; }
        .chat-input { flex: 1; padding: 12px; background: #27272A; border: 1px solid #3F3F46; color: white; border-radius: 8px; font-size: 13px; }
        .chat-input:focus { border-color: #FACC15; outline: none; }
        .send-btn { background: #FACC15; color: #121214; border: none; padding: 0 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <a href="/" style="color: #FACC15; text-decoration: none; font-size: 14px; font-weight: bold;"><i class="fas fa-arrow-left"></i> Leave</a>
            <h1 style="font-size: 16px;">{{ level }} Class Room</h1>
        </header>

        <div class="chat-box" id="chatBox">
            {% if messages %}
                {% for msg in messages %}
                    <div class="msg-bubble">
                        <div class="msg-meta">
                            <span>@{{ msg[0] }}</span>
                            <span style="color: #A1A1AA;">{{ msg[2] }}</span>
                        </div>
                        <div class="msg-text">{{ msg[1] }}</div>
                    </div>
                {% endfor %}
            {% else %}
                <p style="color: #A1A1AA; font-size: 12px; text-align: center; margin-top: 150px;">Welcome to your class lounge! Drop a message to start interacting offline.</p>
            {% endif %}
        </div>

        <form method="POST" class="chat-form">
            <input type="text" name="message" placeholder="Type an update to {{ level }} peers..." class="chat-input" autocomplete="off" required>
            <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        // Auto Scroll Chat Box to the latest message on load
        var cb = document.getElementById('chatBox');
        cb.scrollTop = cb.scrollHeight;
    </script>
</body>
</html>

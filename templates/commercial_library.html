<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commercial Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header header-green">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Hub</a>
            <h1>Commercial Vault</h1>
        </header>
        <main class="main-content">
            <div class="book-item">
                <h4><i class="fas fa-calculator"></i> Financial Accounting</h4>
                <p>Ledger entries, balance sheets, and trial balances.</p>
                <button class="download-button" onclick="alert('Downloading Accounting PDF...')">Download</button>
            </div>
            <div class="book-item">
                <h4><i class="fas fa-coins"></i> Advanced Economics</h4>
                <p>Micro/macro principles, market structures, and supply lines.</p>
                <button class="download-button" onclick="alert('Downloading Economics PDF...')">Download</button>
            </div>
            <div class="book-item">
                <h4><i class="fas fa-store"></i> Commerce Simplified</h4>
                <p>Trade networks, banking sectors, and insurance frameworks.</p>
                <button class="download-button" onclick="alert('Downloading Commerce PDF...')">Download</button>
            </div>
        </main>
    </div>
</body>
</html>

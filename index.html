<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2>StudyHub</h2>
            <nav>
                <ul>
                    <li><a href="#" class="active">📚 My Reading Room</a></li>
                    <li><a href="#">💬 Study Chat</a></li>
                    <li><a href="#">⚙️ Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Welcome back, Student!</h1>
                <p>Your private digital bookshelf</p>
            </header>

            <section class="bookshelf">
                <div class="book-card">
                    <h3>Python Programming 101</h3>
                    <p class="status">Status: Reading</p>
                    <button class="btn">Open Book</button>
                </div>

                <div class="book-card">
                    <h3>Web Development Basics</h3>
                    <p class="status">Status: Completed</p>
                    <button class="btn">Open Book</button>
                </div>

                <div class="book-card add-book">
                    <h3>+</h3>
                    <p>Add New Book</p>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
